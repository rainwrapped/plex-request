@let feedItem = item();

<article
  class="feed-card"
  [class.selected]="selected()"
  [class.active]="active()"
  role="button"
  tabindex="0"
  (click)="open.emit(feedItem)"
  (keydown.enter)="open.emit(feedItem)"
  (keydown.space)="$event.preventDefault(); open.emit(feedItem)"
>
  <div class="feed-card-header">
    <div>
      <h3>{{ feedItem.title }}</h3>
      <p>{{ feedItem.feedName }}</p>
    </div>
    <div class="badges">
      <span class="badge">{{ feedItem.kind | titlecase }} · {{ feedItem.year }}</span>
      @if (feedItem.availability?.inPlex) {
        <span class="badge success">Already in Plex</span>
      }
    </div>
  </div>

  <p class="feed-summary">{{ feedItem.summary }}</p>

  <div class="tag-list">
    @for (tag of feedItem.tags; track tag) {
      <span class="tag">{{ tag }}</span>
    }
  </div>

  <button
    type="button"
    class="action-button"
    [class.secondary]="!selected()"
    [disabled]="!canRequest() || feedItem.availability?.inPlex"
    (click)="$event.stopPropagation(); toggle.emit(feedItem.id)"
  >
    @if (feedItem.availability?.inPlex) {
      Already in Plex
    } @else if (!canRequest()) {
      Browsing only
    } @else if (selected()) {
      Remove from request
    } @else {
      Add to request
    }
  </button>
</article>
